<title>K Controles — Primes</title>

<style>
:root{
  --blue:#2563EB;--blue-d:#1D4ED8;--blue-l:#EFF6FF;--blue-m:#DBEAFE;
  --green:#16A34A;--green-l:#F0FDF4;
  --amber:#D97706;--amber-l:#FFFBEB;
  --red:#DC2626;--red-l:#FEF2F2;
  --purple:#9333EA;--purple-l:#FDF4FF;
  --g50:#F8FAFC;--g100:#F1F5F9;--g200:#E2E8F0;--g300:#CBD5E1;
  --g400:#94A3B8;--g500:#64748B;--g700:#334155;--g900:#0F172A;
  --white:#FFFFFF;--r:12px;--r-sm:8px;
  --sh:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
body{min-height:100%;min-height:-webkit-fill-available;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;background:#1e293b;color:var(--g900);font-size:15px}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;max-width:430px;margin:0 auto;background:var(--g50);position:relative;overflow:hidden;box-shadow:0 0 60px rgba(0,0,0,.4)}

/* HEADER */
.hdr{background:var(--white);padding:12px 16px;padding-top:max(env(safe-area-inset-top),12px);display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--g200);flex-shrink:0;min-height:56px}
.hdr h1{font-size:17px;font-weight:700;color:var(--g900);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hdr .sub{font-size:12px;color:var(--g500);margin-top:1px}
.btn-back{width:36px;height:36px;border:none;background:var(--g100);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--g700);flex-shrink:0}
.btn-ico{width:36px;height:36px;border:none;background:var(--blue-l);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;flex-shrink:0}

/* SCROLL AREA */
.scr{flex:1;overflow-y:auto;padding:14px 14px 100px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}

/* BOTTOM NAV */
.bnav{background:var(--white);border-top:1px solid var(--g200);display:flex;flex-shrink:0;padding-bottom:max(env(safe-area-inset-bottom),8px)}
.nb{flex:1;padding:8px 4px 10px;border:none;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--g400);font-family:inherit;font-weight:500}
.nb.on{color:var(--blue)}
.nb .ni{font-size:22px;line-height:1}

/* CARDS */
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--g200);padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh)}

/* CONTROLLER ITEM */
.ci{background:var(--white);border-radius:var(--r);border:1px solid var(--g200);padding:14px 16px;margin-bottom:10px;box-shadow:var(--sh);display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .1s}
.ci:active{background:var(--g50)}
.av{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.ci-info{flex:1;min-width:0}
.ci-name{font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-meta{font-size:12px;color:var(--g500);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.ci-prime{text-align:right;flex-shrink:0}
.ci-amt{font-size:16px;font-weight:800;color:var(--blue)}
.ci-qlbl{font-size:11px;color:var(--g400)}

/* BADGES */
.bdg{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700}
.bdg-j{background:var(--blue-l);color:var(--blue)}
.bdg-c{background:var(--green-l);color:var(--green)}
.bdg-r{background:var(--purple-l);color:var(--purple)}
.bdg-t{background:var(--g100);color:var(--g500);font-size:12px}

/* PROFILE SELECTOR */
.pg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.pb{border:1.5px solid var(--g200);border-radius:var(--r-sm);padding:10px 6px;cursor:pointer;text-align:center;background:var(--white);transition:all .15s}
.pb .pr{font-size:12px;font-weight:700;color:var(--g700)}
.pb .pm{font-size:10px;color:var(--g400);margin-top:2px}
.pb.sj{border-color:var(--blue);background:var(--blue-l)}.pb.sj .pr{color:var(--blue)}
.pb.sc{border-color:var(--green);background:var(--green-l)}.pb.sc .pr{color:var(--green)}
.pb.sr{border-color:var(--purple);background:var(--purple-l)}.pb.sr .pr{color:var(--purple)}

/* CRITERIA CARD */
.cc{background:var(--white);border-radius:var(--r);border:1px solid var(--g200);padding:14px 16px;margin-bottom:10px;transition:border-color .2s,background .2s}
.cc.dep-on{border-color:#F59E0B;background:#FFFBEB}
.cc-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.cc-ttl{font-size:14px;font-weight:700;display:flex;align-items:center;gap:8px}
.cc-r{display:flex;align-items:center;gap:8px}
.cc-p{font-size:11px;padding:2px 8px;border-radius:20px;font-weight:700}
.cc-s{font-size:21px;font-weight:800;min-width:36px;text-align:right}

/* SLIDER */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;height:5px;border-radius:3px;background:var(--g200);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:var(--blue);cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.2)}
input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:50%;background:var(--blue);cursor:pointer;border:none}
.slbls{display:flex;justify-content:space-between;font-size:10px;color:var(--g400);margin-top:4px}

/* DÉPASSE TOGGLE */
.dep-row{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--g200);cursor:pointer;user-select:none}
.dep-box{width:20px;height:20px;border-radius:5px;border:2px solid var(--g300);background:var(--white);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.dep-box.on{background:#F59E0B;border-color:#F59E0B}
.dep-box.on::after{content:"✓";color:white;font-size:13px;font-weight:800;line-height:1}
.dep-tr{font-size:21px;transition:transform .2s;display:inline-block}
.dep-tr.on{transform:scale(1.3)}
.dep-txt{flex:1}
.dep-lbl{font-size:13px;font-weight:700}
.dep-sub{font-size:11px;color:var(--g400)}
.dep-pill{font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--g100);color:var(--g400);border:1px solid var(--g200);white-space:nowrap;transition:all .15s}
.dep-pill.on{background:#FEF3C7;color:#92400E;border-color:#F59E0B}

/* OBSERVATION */
.obs-tog{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:12px;color:var(--g500);cursor:pointer;user-select:none}
.obs-ta{margin-top:8px;width:100%;border:1.5px solid var(--g200);border-radius:var(--r-sm);padding:10px 12px;font-size:16px;font-family:inherit;resize:none;outline:none;color:var(--g900);background:var(--g50);line-height:1.5;-webkit-appearance:none;appearance:none}
.obs-ta:focus{border-color:var(--blue);background:var(--white)}

/* RESULT CARD */
.rc{background:var(--white);border-radius:var(--r);border:1px solid var(--g200);padding:16px;margin-bottom:14px}
.rr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--g100)}
.rr:last-child{border-bottom:none}
.rl{font-size:13px;color:var(--g500)}
.rv{font-size:13px;font-weight:700}
.rtot{display:flex;justify-content:space-between;align-items:center;padding-top:12px;margin-top:8px;border-top:2px solid var(--g200)}
.rtlbl{font-size:15px;font-weight:700}
.rtamt{font-size:30px;font-weight:900}

/* PROGRESS BAR */
.pbar-w{background:var(--g100);border-radius:4px;height:8px;overflow:hidden;margin:8px 0 4px}
.pbar-f{height:100%;border-radius:4px;transition:width .4s,background .4s}

/* BUTTONS */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:14px 20px;border-radius:var(--r);border:none;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s;width:100%;margin-bottom:10px}
.btn:active{opacity:.75}
.btn-p{background:var(--blue);color:var(--white)}
.btn-g{background:var(--green);color:var(--white)}
.btn-o{background:var(--white);color:var(--g700);border:1.5px solid var(--g200)}
.btn-d{background:var(--red-l);color:var(--red);border:1px solid #FECACA}
.btn-a{background:#FEF3C7;color:#92400E;border:1px solid #F59E0B}
.btn-row{display:flex;gap:10px}
.btn-row .btn{margin-bottom:0}

/* FORM — font-size 16px minimum empêche le zoom automatique sur iOS */
.fg{margin-bottom:14px}
.flbl{font-size:13px;font-weight:700;color:var(--g700);margin-bottom:6px;display:block}
.finp{width:100%;border:1.5px solid var(--g200);border-radius:var(--r-sm);padding:12px 14px;font-size:16px;font-family:inherit;outline:none;background:var(--white);color:var(--g900);-webkit-appearance:none;appearance:none}
.finp:focus{border-color:var(--blue)}

/* QUARTER SELECTOR */
.tg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:0;flex:1;margin-right:12px}
.tb{border:1.5px solid var(--g200);border-radius:var(--r-sm);padding:8px 4px;cursor:pointer;text-align:center;background:var(--white);font-size:13px;font-weight:700;color:var(--g500);font-family:inherit}
.tb.on{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}

/* YEAR NAV */
.ynav{display:flex;align-items:center;gap:16px;justify-content:center;margin-bottom:14px}
.ynav button{width:32px;height:32px;border:1.5px solid var(--g200);border-radius:50%;background:var(--white);cursor:pointer;font-size:16px;color:var(--g700);font-family:inherit}
.ynav span{font-size:18px;font-weight:800}

/* SECTION TITLE */
.stitle{font-size:11px;font-weight:800;color:var(--g500);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:4px}

/* RECAP TABLE */
.rtbl{width:100%;border-collapse:collapse;font-size:13px}
.rtbl th{padding:7px 8px;text-align:left;font-weight:800;color:var(--g400);font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid var(--g200)}
.rtbl td{padding:9px 8px;border-bottom:1px solid var(--g100);color:var(--g900)}
.rtbl tr:last-child td{border-bottom:none}
.rtbl tfoot td{font-weight:800;border-top:2px solid var(--g200);background:var(--g50)}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;padding:48px 24px;text-align:center}
.empty-ico{font-size:60px;margin-bottom:16px}
.empty-ttl{font-size:17px;font-weight:800;margin-bottom:8px}
.empty-sub{font-size:14px;color:var(--g400);line-height:1.6}

/* TOAST */
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--g900);color:white;padding:10px 20px;border-radius:30px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast.show{opacity:1}

/* DIVIDER */
hr.dv{border:none;border-top:1px solid var(--g200);margin:14px 0}

/* CHIP */
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:700;background:#FEF3C7;color:#92400E;border:1px solid #F59E0B;margin:2px}

/* SAVED BADGE */
.saved-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:var(--green-l);color:var(--green)}

/* LOGO */
.app-logo{width:36px;height:36px;border-radius:50%;object-fit:contain;flex-shrink:0;border:2px solid #FFE0B2}
.splash-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:20px;padding:40px;background:white}
.splash-logo{width:130px;height:130px}
.splash-title{font-size:26px;font-weight:900;color:#F97316}
.splash-sub{font-size:14px;color:var(--g500);text-align:center;line-height:1.6;max-width:260px}
.splash-btn{background:#F97316;color:white;border:none;padding:14px 44px;border-radius:30px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ═══════════════════════════════════════════════════════════
// DATA LAYER — localStorage avec fallback mémoire (iOS file://)
// ═══════════════════════════════════════════════════════════
var STORAGE_KEY = 'prime-excellence-v1';
var _memDB = null; // fallback si localStorage bloqué
var _lsAvailable = (function(){
  try{localStorage.setItem('__t','1');localStorage.removeItem('__t');return true;}
  catch(e){return false;}
})();

function loadDB() {
  if(_lsAvailable){
    try{return JSON.parse(localStorage.getItem(STORAGE_KEY))||{controleurs:[]};}
    catch(e){}
  }
  return _memDB||{controleurs:[]};
}
function saveDB() {
  if(_lsAvailable){
    try{localStorage.setItem(STORAGE_KEY,JSON.stringify(db));return;}catch(e){}
  }
  _memDB=JSON.parse(JSON.stringify(db)); // deep copy en mémoire
}
var db = loadDB();

// ═══════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════
function uid() { return Date.now().toString(36)+Math.random().toString(36).substr(2); }
function curQ() { return Math.floor(new Date().getMonth()/3)+1; }
function curY() { return new Date().getFullYear(); }
function profilLabel(p) { return {jeune:'Jeune contrôleur',confirme:'Confirmé',responsable:'Responsable'}[p]||p; }
function profilMax(p) { return {jeune:300,confirme:500,responsable:600}[p]||300; }
function initials(pn,n) { return ((pn||'')[0]||'').toUpperCase()+((n||'')[0]||'').toUpperCase(); }
function getCtrl(id) { return db.controleurs.find(function(c){return c.id===id;}); }
function getEval(ctrl,y,t) { return (ctrl.evaluations||[]).find(function(e){return e.annee==y&&e.trimestre==t;}); }

var AV_COLORS = [
  ['#EFF6FF','#1D4ED8'],['#F0FDF4','#15803D'],['#FDF4FF','#7E22CE'],
  ['#FFF7ED','#C2410C'],['#ECFDF5','#065F46'],['#FEF2F2','#B91C1C'],
  ['#FFFBEB','#92400E'],['#F0F9FF','#0369A1']
];
function avColor(name) {
  var h=0;for(var i=0;i<(name||'').length;i++)h=(h*31+name.charCodeAt(i))&0x7fffffff;
  return AV_COLORS[h%AV_COLORS.length];
}

function calcPrime(scores,depasse,max) {
  var prod=scores.prod||0,qual=scores.qual||0,sat=scores.sat||0,vie=scores.vie||0;
  var pp=Math.round(max*prod*0.4/100);
  var pq=Math.round(max*qual*0.3/100);
  var ps=Math.round(max*sat*0.2/100);
  var pv=Math.round(max*vie*0.1/100);
  var brute=pp+pq+ps+pv;
  var bpc=Math.round(max*0.10);
  var btot=0;
  ['prod','qual','sat','vie'].forEach(function(k){if(depasse[k])btot+=bpc;});
  var sg=Math.round(prod*0.4+qual*0.3+sat*0.2+vie*0.1);
  return {pp:pp,pq:pq,ps:ps,pv:pv,brute:brute,bpc:bpc,btot:btot,fin:brute+btot,sg:sg};
}

function barColor(sg) {
  return sg>=80?'#16A34A':sg>=60?'#2563EB':sg>=40?'#D97706':'#DC2626';
}

function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2600);
}

// ═══════════════════════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════════════════════
var navStack = [{page:'home'}];
function curPage() { return navStack[navStack.length-1]; }
function goBack() { if(navStack.length>1){navStack.pop();render();} }

function navigate(page,params) {
  params=params||{};
  if(page==='home'){navStack=[{page:'home'}];}
  else if(page==='recap'){navStack=[{page:'home'},{page:'recap'}];}
  else if(page==='settings'){navStack=[{page:'home'},{page:'settings'}];}
  else if(page==='add-ctrl'){
    formProfil='jeune';
    navStack.push({page:'add-ctrl'});
  }
  else if(page==='edit-ctrl'){
    var c=getCtrl(params.ctrlId);
    formProfil=c?c.profil:'jeune';
    navStack.push({page:'edit-ctrl',ctrlId:params.ctrlId});
  }
  else if(page==='eval'){
    initEvalState(params.ctrlId);
    navStack.push({page:'eval',ctrlId:params.ctrlId});
  }
  else { navStack.push(Object.assign({page:page},params)); }
  render();
}

// ═══════════════════════════════════════════════════════════
// EVAL STATE
// ═══════════════════════════════════════════════════════════
var ES = {
  annee:curY(),trimestre:curQ(),
  scores:{prod:80,qual:90,sat:75,vie:85},
  depasse:{prod:false,qual:false,sat:false,vie:false},
  obs:{prod:'',qual:'',sat:'',vie:''},
  obsOpen:{prod:false,qual:false,sat:false,vie:false}
};

function initEvalState(ctrlId) {
  ES.annee=curY();ES.trimestre=curQ();
  ES.scores={prod:80,qual:90,sat:75,vie:85};
  ES.depasse={prod:false,qual:false,sat:false,vie:false};
  ES.obs={prod:'',qual:'',sat:'',vie:''};
  ES.obsOpen={prod:false,qual:false,sat:false,vie:false};
  loadEvalFromSaved(ctrlId);
}

function loadEvalFromSaved(ctrlId) {
  var ctrl=getCtrl(ctrlId);if(!ctrl)return;
  var ev=getEval(ctrl,ES.annee,ES.trimestre);
  if(ev){
    ES.scores=Object.assign({},ev.scores);
    ES.depasse=Object.assign({},ev.depasse);
    ES.obs=Object.assign({},ev.obs||ev.observations||{prod:'',qual:'',sat:'',vie:''});
  }
}

// ═══════════════════════════════════════════════════════════
// RENDER DISPATCH
// ═══════════════════════════════════════════════════════════
function render() {
  var p=curPage();
  var app=document.getElementById('app');
  if(p.page==='home') renderHome(app);
  else if(p.page==='eval') renderEval(app,p.ctrlId);
  else if(p.page==='add-ctrl') renderAddCtrl(app,null);
  else if(p.page==='edit-ctrl') renderAddCtrl(app,p.ctrlId);
  else if(p.page==='recap') renderRecap(app);
  else if(p.page==='settings') renderSettings(app);
}

// ═══════════════════════════════════════════════════════════
// HOME
// ═══════════════════════════════════════════════════════════
function renderHome(app) {
  var q=curQ(),y=curY(),ql='T'+q+' '+y;
  var list=db.controleurs.slice().sort(function(a,b){return(a.nom||'').localeCompare(b.nom||'');});
  app.innerHTML=
    '<div class="hdr" style="border-bottom:2px solid #FFE0B2">'+
      '<img class="app-logo" src="'+LOGO_URI+'" alt="K Controles">'+
      '<div style="flex:1;min-width:0"><h1 style="color:#F97316">K Controles</h1><div class="sub">'+ql+' · '+db.controleurs.length+' contrôleur'+(db.controleurs.length!==1?'s':'')+'</div></div>'+
      '<button class="btn-ico" style="background:#FFF3E0" onclick="navigate(\'add-ctrl\')" aria-label="Ajouter">➕</button>'+
    '</div>'+
    '<div class="scr">'+
      (list.length===0?
        '<div class="empty"><div class="empty-ico">👷</div><div class="empty-ttl">Aucun contrôleur</div><div class="empty-sub">Appuie sur ➕ pour ajouter ton premier contrôleur.</div></div>'
      :
        '<div class="stitle">Contrôleurs</div>'+
        list.map(function(ctrl){
          var ev=getEval(ctrl,y,q);
          var ac=avColor(ctrl.nom);
          var bg=ac[0],fg=ac[1];
          var bdgCls={jeune:'bdg-j',confirme:'bdg-c',responsable:'bdg-r'}[ctrl.profil]||'bdg-j';
          return '<div class="ci" onclick="navigate(\'eval\',{ctrlId:\''+ctrl.id+'\'})">'+
            '<div class="av" style="background:'+bg+';color:'+fg+'">'+initials(ctrl.prenom,ctrl.nom)+'</div>'+
            '<div class="ci-info">'+
              '<div class="ci-name">'+ctrl.prenom+' '+ctrl.nom+'</div>'+
              '<div class="ci-meta">'+
                '<span class="bdg '+bdgCls+'">'+profilLabel(ctrl.profil)+'</span>'+
                (ctrl.centre?' <span style="color:var(--g400)">'+ctrl.centre+'</span>':'')+
              '</div>'+
            '</div>'+
            '<div class="ci-prime">'+
              (ev?'<div class="ci-amt">'+ev.fin+' €</div><div class="ci-qlbl">'+ql+'</div>':'<div style="font-size:12px;color:var(--g300)">Non évalué</div>')+
            '</div>'+
          '</div>';
        }).join('')
      )+
    '</div>'+
    bnav('home');
}

// ═══════════════════════════════════════════════════════════
// EVAL PAGE
// ═══════════════════════════════════════════════════════════
var CRIT=[
  {k:'prod',ico:'📊',lbl:'Productivité',     pds:'40 %',col:'#2563EB',bg:'#EFF6FF',sl:'Non atteint',sr:'Objectif atteint',tlbl:'Objectif dépassé !',  tsub:'Le contrôleur a surpassé ses cibles'},
  {k:'qual',ico:'🛡️',lbl:'Qualité',           pds:'30 %',col:'#16A34A',bg:'#F0FDF4',sl:'Nombreuses erreurs',sr:'Objectif atteint',tlbl:'Excellence qualité !',tsub:'Zéro erreur, zéro litige ce trimestre'},
  {k:'sat', ico:'😊',lbl:'Satisfaction client',pds:'20 %',col:'#D97706',bg:'#FFFBEB',sl:'Avis négatifs',sr:'Objectif atteint',tlbl:'Clients conquis !',   tsub:'Retours exceptionnels & notes 5 étoiles'},
  {k:'vie', ico:'👥',lbl:'Vie du centre',      pds:'10 %',col:'#64748B',bg:'#F8FAFC',sl:'Peu impliqué',sr:'Objectif atteint',tlbl:'Pilier du centre !',   tsub:'Implication et entraide exemplaires'}
];

function renderEval(app,ctrlId) {
  var ctrl=getCtrl(ctrlId);if(!ctrl){goBack();return;}
  var max=profilMax(ctrl.profil);
  var c=calcPrime(ES.scores,ES.depasse,max);
  var bc=barColor(c.sg);
  var ev=getEval(ctrl,ES.annee,ES.trimestre);
  var ac=avColor(ctrl.nom);

  var critHTML=CRIT.map(function(cr){
    var dep=ES.depasse[cr.k];
    var obsv=ES.obs[cr.k]||'';
    var obsOpen=ES.obsOpen[cr.k];
    return '<div class="cc '+(dep?'dep-on':'')+'" id="cc-'+cr.k+'">'+
      '<div class="cc-hdr">'+
        '<div class="cc-ttl" style="color:'+cr.col+'">'+cr.ico+' '+cr.lbl+'</div>'+
        '<div class="cc-r">'+
          '<span class="cc-p" style="background:'+cr.bg+';color:'+cr.col+'">'+cr.pds+'</span>'+
          '<span class="cc-s" id="sv-'+cr.k+'">'+ES.scores[cr.k]+'</span>'+
        '</div>'+
      '</div>'+
      '<input type="range" min="0" max="100" step="1" value="'+ES.scores[cr.k]+'" '+
             'style="accent-color:'+cr.col+'" '+
             'oninput="onScore(\''+cr.k+'\',this.value,\''+ctrlId+'\')">'+
      '<div class="slbls"><span>'+cr.sl+'</span><span>'+cr.sr+'</span></div>'+
      '<div class="dep-row" onclick="onDep(\''+cr.k+'\',\''+ctrlId+'\')">'+
        '<div class="dep-box '+(dep?'on':'')+'" id="db-'+cr.k+'"></div>'+
        '<span class="dep-tr '+(dep?'on':'')+'" id="dt-'+cr.k+'">🏆</span>'+
        '<div class="dep-txt">'+
          '<div class="dep-lbl">'+cr.tlbl+'</div>'+
          '<div class="dep-sub">'+cr.tsub+'</div>'+
        '</div>'+
        '<span class="dep-pill '+(dep?'on':'')+'" id="dp-'+cr.k+'">+10 %</span>'+
      '</div>'+
      '<div class="obs-tog" onclick="onObsTog(\''+cr.k+'\',\''+ctrlId+'\')">'+
        '<span>'+(obsOpen?'▾':'▸')+'</span>'+
        '<span>'+(obsv?'📝 Observation ajoutée':'Ajouter une observation')+'</span>'+
      '</div>'+
      (obsOpen?'<textarea class="obs-ta" rows="3" placeholder="Observation sur '+cr.lbl.toLowerCase()+'..." '+
               'onchange="onObs(\''+cr.k+'\',this.value)">'+obsv+'</textarea>':'')+
    '</div>';
  }).join('');

  var resultHTML=buildResultHTML(c,bc);

  app.innerHTML=
    '<div class="hdr">'+
      '<button class="btn-back" onclick="goBack()">←</button>'+
      '<div style="flex:1;min-width:0">'+
        '<h1>'+ctrl.prenom+' '+ctrl.nom+'</h1>'+
        '<div class="sub">'+(ev?'<span class="saved-badge">✅ Sauvegardé</span> · ':'')+
          'T'+ES.trimestre+' '+ES.annee+'</div>'+
      '</div>'+
      '<div class="av" style="background:'+ac[0]+';color:'+ac[1]+';width:36px;height:36px;font-size:12px">'+initials(ctrl.prenom,ctrl.nom)+'</div>'+
    '</div>'+
    '<div class="scr" id="eval-scr">'+
      '<div class="stitle">Période</div>'+
      '<div style="display:flex;align-items:center;margin-bottom:16px">'+
        '<div class="tg">'+
          [1,2,3,4].map(function(t){
            return '<button class="tb '+(ES.trimestre==t?'on':'')+'" onclick="onTrim('+t+',\''+ctrlId+'\')">T'+t+'</button>';
          }).join('')+
        '</div>'+
        '<div style="display:flex;align-items:center;gap:8px">'+
          '<button style="width:28px;height:28px;border:1.5px solid var(--g200);border-radius:50%;background:var(--white);cursor:pointer;font-size:13px;font-family:inherit" onclick="onYear(-1,\''+ctrlId+'\')">◀</button>'+
          '<span style="font-size:14px;font-weight:800;min-width:38px;text-align:center">'+ES.annee+'</span>'+
          '<button style="width:28px;height:28px;border:1.5px solid var(--g200);border-radius:50%;background:var(--white);cursor:pointer;font-size:13px;font-family:inherit" onclick="onYear(1,\''+ctrlId+'\')">▶</button>'+
        '</div>'+
      '</div>'+
      '<div class="stitle">Évaluation</div>'+
      critHTML+
      '<div class="stitle">Résultat</div>'+
      '<div class="rc" id="rc">'+resultHTML+'</div>'+
      '<button class="btn btn-p" onclick="onSave(\''+ctrlId+'\')">💾 Sauvegarder</button>'+
      '<div class="btn-row">'+
        '<button class="btn btn-g" style="flex:1" onclick="onPDF(\''+ctrlId+'\')">📄 Rapport PDF</button>'+
        '<button class="btn btn-o" style="flex:1" onclick="onEmail(\''+ctrlId+'\')">✉️ Email</button>'+
      '</div>'+
      '<button class="btn btn-o" style="font-size:13px;color:var(--g500)" onclick="navigate(\'edit-ctrl\',{ctrlId:\''+ctrlId+'\'})">⚙️ Modifier le profil de '+ctrl.prenom+'</button>'+
    '</div>'+
    bnav('none');
}

function buildResultHTML(c,bc) {
  return '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">'+
    '<span style="font-size:13px;font-weight:700">Score global pondéré</span>'+
    '<span style="font-size:16px;font-weight:800">'+c.sg+' %</span>'+
  '</div>'+
  '<div class="pbar-w"><div class="pbar-f" style="width:'+c.sg+'%;background:'+bc+'"></div></div>'+
  '<div class="rr" style="margin-top:10px"><span class="rl">Productivité (40 %)</span><span class="rv">'+c.pp+' €</span></div>'+
  '<div class="rr"><span class="rl">Qualité (30 %)</span><span class="rv">'+c.pq+' €</span></div>'+
  '<div class="rr"><span class="rl">Satisfaction client (20 %)</span><span class="rv">'+c.ps+' €</span></div>'+
  '<div class="rr"><span class="rl">Vie du centre (10 %)</span><span class="rv">'+c.pv+' €</span></div>'+
  (c.btot>0?'<div class="rr"><span class="rl">🏆 Bonus dépassement</span><span class="rv" style="color:#D97706">+ '+c.btot+' €</span></div>':'')+
  '<div class="rtot">'+
    '<span class="rtlbl">Prime T'+(typeof ES!=='undefined'?ES.trimestre:'?')+'</span>'+
    '<span class="rtamt" style="color:'+bc+'">'+c.fin+' €</span>'+
  '</div>';
}

// Lightweight DOM updates (no full re-render)
function onScore(k,v,ctrlId) {
  ES.scores[k]=parseInt(v);
  document.getElementById('sv-'+k).textContent=v;
  refreshRC(ctrlId);
}
function onDep(k,ctrlId) {
  ES.depasse[k]=!ES.depasse[k];
  var on=ES.depasse[k];
  document.getElementById('db-'+k).className='dep-box'+(on?' on':'');
  document.getElementById('dt-'+k).className='dep-tr'+(on?' on':'');
  document.getElementById('dp-'+k).className='dep-pill'+(on?' on':'');
  document.getElementById('cc-'+k).className='cc'+(on?' dep-on':'');
  refreshRC(ctrlId);
}
function onObsTog(k,ctrlId) {
  ES.obsOpen[k]=!ES.obsOpen[k];
  renderEval(document.getElementById('app'),ctrlId);
}
function onObs(k,v) { ES.obs[k]=v; }
function onTrim(t,ctrlId) {
  ES.trimestre=t;
  ES.scores={prod:80,qual:90,sat:75,vie:85};
  ES.depasse={prod:false,qual:false,sat:false,vie:false};
  ES.obs={prod:'',qual:'',sat:'',vie:''};
  ES.obsOpen={prod:false,qual:false,sat:false,vie:false};
  loadEvalFromSaved(ctrlId);
  renderEval(document.getElementById('app'),ctrlId);
}
function onYear(d,ctrlId) {
  ES.annee+=d;
  ES.scores={prod:80,qual:90,sat:75,vie:85};
  ES.depasse={prod:false,qual:false,sat:false,vie:false};
  ES.obs={prod:'',qual:'',sat:'',vie:''};
  ES.obsOpen={prod:false,qual:false,sat:false,vie:false};
  loadEvalFromSaved(ctrlId);
  renderEval(document.getElementById('app'),ctrlId);
}
function refreshRC(ctrlId) {
  var ctrl=getCtrl(ctrlId);if(!ctrl)return;
  var c=calcPrime(ES.scores,ES.depasse,profilMax(ctrl.profil));
  var rc=document.getElementById('rc');
  if(rc) rc.innerHTML=buildResultHTML(c,barColor(c.sg));
}

// ═══════════════════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════════════════
function onSave(ctrlId) {
  var ctrl=getCtrl(ctrlId);if(!ctrl)return;
  var c=calcPrime(ES.scores,ES.depasse,profilMax(ctrl.profil));
  var ev={
    id:uid(),annee:ES.annee,trimestre:ES.trimestre,
    savedAt:new Date().toISOString(),
    scores:Object.assign({},ES.scores),
    depasse:Object.assign({},ES.depasse),
    obs:Object.assign({},ES.obs),
    brute:c.brute,btot:c.btot,fin:c.fin,sg:c.sg
  };
  if(!ctrl.evaluations)ctrl.evaluations=[];
  var idx=ctrl.evaluations.findIndex(function(e){return e.annee==ES.annee&&e.trimestre==ES.trimestre;});
  if(idx>=0){ev.id=ctrl.evaluations[idx].id;ctrl.evaluations[idx]=ev;}
  else ctrl.evaluations.push(ev);
  saveDB();
  showToast('✅ Évaluation sauvegardée !');
  renderEval(document.getElementById('app'),ctrlId);
}

// ═══════════════════════════════════════════════════════════
// PDF
// ═══════════════════════════════════════════════════════════
function onPDF(ctrlId) {
  if(!window.jspdf){showToast('⚠️ PDF non disponible (connexion requise)');return;}
  var ctrl=getCtrl(ctrlId);if(!ctrl)return;
  var max=profilMax(ctrl.profil);
  var c=calcPrime(ES.scores,ES.depasse,max);
  var bc=c.sg>=80?[22,163,74]:c.sg>=60?[37,99,235]:[220,38,38];
  var doc=new window.jspdf.jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  var W=210,M=18,y=0;

  // Header band
  doc.setFillColor(37,99,235);
  doc.rect(0,0,W,38,'F');
  doc.setTextColor(255,255,255);
  doc.setFontSize(19);doc.setFont('helvetica','bold');
  doc.text("RAPPORT DE PRIME D'EXCELLENCE",M,16);
  doc.setFontSize(11);doc.setFont('helvetica','normal');
  doc.text('Trimestre T'+ES.trimestre+' '+ES.annee,M,25);
  doc.text('Emis le '+new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'long',year:'numeric'}),M,32);

  y=48;
  // Controller box
  doc.setFillColor(239,246,255);
  doc.roundedRect(M,y,W-2*M,30,4,4,'F');
  doc.setTextColor(15,23,42);
  doc.setFontSize(16);doc.setFont('helvetica','bold');
  doc.text(ctrl.prenom+' '+ctrl.nom,M+8,y+11);
  doc.setFontSize(11);doc.setFont('helvetica','normal');doc.setTextColor(100,116,139);
  doc.text(profilLabel(ctrl.profil)+(ctrl.centre?' · '+ctrl.centre:''),M+8,y+19);
  doc.text('Prime maximale : '+max+' € / trimestre',M+8,y+26);
  // Prime amount
  doc.setFontSize(22);doc.setFont('helvetica','bold');doc.setTextColor(...bc);
  doc.text(c.fin+' €',W-M-6,y+17,{align:'right'});
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(100,116,139);
  doc.text('Prime trimestrielle',W-M-6,y+24,{align:'right'});

  y+=38;
  // Score bar
  doc.setFontSize(11);doc.setFont('helvetica','bold');doc.setTextColor(15,23,42);
  doc.text('Score global pondéré : '+c.sg+' %',M,y);y+=5;
  doc.setFillColor(226,232,240);doc.roundedRect(M,y,W-2*M,5,2,2,'F');
  doc.setFillColor(...bc);doc.roundedRect(M,y,(W-2*M)*c.sg/100,5,2,2,'F');

  y+=13;
  // Table title
  doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(100,116,139);
  doc.text('DÉTAIL PAR CRITÈRE',M,y);y+=5;

  // Table header
  doc.setFillColor(248,250,252);doc.rect(M,y,W-2*M,8,'F');
  doc.setFontSize(8.5);doc.setFont('helvetica','bold');doc.setTextColor(100,116,139);
  doc.text('Critère',M+3,y+5.5);
  doc.text('Poids',M+78,y+5.5);
  doc.text('Score',M+105,y+5.5);
  doc.text('Montant',W-M-28,y+5.5);
  y+=8;

  var rows=[
    {lbl:'Productivité',pds:'40 %',sc:ES.scores.prod,mt:c.pp,k:'prod'},
    {lbl:'Qualité',pds:'30 %',sc:ES.scores.qual,mt:c.pq,k:'qual'},
    {lbl:'Satisfaction client',pds:'20 %',sc:ES.scores.sat,mt:c.ps,k:'sat'},
    {lbl:'Vie du centre',pds:'10 %',sc:ES.scores.vie,mt:c.pv,k:'vie'}
  ];
  rows.forEach(function(r,i){
    doc.setFillColor(i%2===0?255:248,i%2===0?255:250,i%2===0?255:252);
    doc.rect(M,y,W-2*M,14,'F');
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(15,23,42);
    doc.text(r.lbl,M+3,y+6);
    if(ES.depasse[r.k]){
      doc.setFontSize(8);doc.setTextColor(217,119,6);doc.text('Objectif depasse',M+3,y+11);
    } else if(ES.obs[r.k]){
      doc.setFontSize(8);doc.setTextColor(100,116,139);
      var ot=ES.obs[r.k].substring(0,40)+(ES.obs[r.k].length>40?'...':'');
      doc.text(ot,M+3,y+11);
    }
    doc.setFontSize(10);doc.setFont('helvetica','normal');doc.setTextColor(100,116,139);
    doc.text(r.pds,M+78,y+6);
    doc.setTextColor(15,23,42);
    doc.text(r.sc+'/100',M+105,y+6);
    doc.setFont('helvetica','bold');
    doc.text(r.mt+' €',W-M-4,y+6,{align:'right'});
    y+=14;
  });

  if(c.btot>0){
    doc.setFillColor(255,251,235);doc.rect(M,y,W-2*M,10,'F');
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(217,119,6);
    doc.text('Bonus depassement objectifs',M+3,y+7);
    doc.text('+ '+c.btot+' €',W-M-4,y+7,{align:'right'});
    y+=10;
  }

  doc.setFillColor(37,99,235);doc.rect(M,y,W-2*M,12,'F');
  doc.setFontSize(12);doc.setFont('helvetica','bold');doc.setTextColor(255,255,255);
  doc.text('PRIME TRIMESTRIELLE TOTALE',M+3,y+8.5);
  doc.text(c.fin+' €',W-M-4,y+8.5,{align:'right'});
  y+=20;

  // Observations
  var hasObs=Object.values(ES.obs).some(function(o){return o&&o.trim();});
  if(hasObs){
    doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(100,116,139);
    doc.text('OBSERVATIONS',M,y);y+=7;
    var CNAMES={prod:'Productivité',qual:'Qualité',sat:'Satisfaction client',vie:'Vie du centre'};
    Object.entries(ES.obs).forEach(function(entry){
      var k=entry[0],v=entry[1];
      if(!v||!v.trim())return;
      doc.setFontSize(10);doc.setFont('helvetica','bold');doc.setTextColor(15,23,42);
      doc.text(CNAMES[k]+' :',M,y);
      doc.setFont('helvetica','normal');doc.setTextColor(71,85,105);
      var lines=doc.splitTextToSize(v,W-2*M-32);
      doc.text(lines,M+32,y);
      y+=lines.length*6+3;
    });
  }

  // Footer
  doc.setDrawColor(226,232,240);doc.line(M,280,W-M,280);
  doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(148,163,184);
  doc.text('Document confidentiel · Primes Excellence',M,285);
  doc.text(ctrl.prenom+' '+ctrl.nom+' · T'+ES.trimestre+' '+ES.annee,W-M,285,{align:'right'});

  doc.save('prime-'+ctrl.nom.toLowerCase().replace(/\s+/g,'-')+'-T'+ES.trimestre+'-'+ES.annee+'.pdf');
  showToast('📄 PDF généré !');
}

function onEmail(ctrlId) {
  var ctrl=getCtrl(ctrlId);if(!ctrl)return;
  var c=calcPrime(ES.scores,ES.depasse,profilMax(ctrl.profil));
  var subj=encodeURIComponent('Rapport de prime – T'+ES.trimestre+' '+ES.annee);
  var depNames={prod:'Productivité',qual:'Qualité',sat:'Satisfaction client',vie:'Vie du centre'};
  var depList=Object.keys(ES.depasse).filter(function(k){return ES.depasse[k];}).map(function(k){return depNames[k];});
  var body='Bonjour '+ctrl.prenom+',\n\n';
  body+='Voici ton rapport de prime d\'excellence pour T'+ES.trimestre+' '+ES.annee+'.\n\n';
  body+='─────────────────────────────\n';
  body+='PRIME TRIMESTRIELLE : '+c.fin+' €\n';
  body+='─────────────────────────────\n\n';
  body+='Détail :\n';
  body+='  • Productivité (40 %) ......... '+c.pp+' €   ['+ES.scores.prod+'/100]\n';
  body+='  • Qualité (30 %) .............. '+c.pq+' €   ['+ES.scores.qual+'/100]\n';
  body+='  • Satisfaction client (20 %) .. '+c.ps+' €   ['+ES.scores.sat+'/100]\n';
  body+='  • Vie du centre (10 %) ........ '+c.pv+' €   ['+ES.scores.vie+'/100]\n';
  if(c.btot>0) body+='\n  🏆 Bonus dépassement ........... +'+c.btot+' € ('+depList.join(', ')+')\n';
  body+='\nScore global pondéré : '+c.sg+' %\n';
  var hasObs=Object.values(ES.obs).some(function(o){return o&&o.trim();});
  if(hasObs){
    var CN={prod:'Productivité',qual:'Qualité',sat:'Satisfaction client',vie:'Vie du centre'};
    body+='\nObservations :\n';
    Object.entries(ES.obs).forEach(function(e){if(e[1]&&e[1].trim())body+='  • '+CN[e[0]]+' : '+e[1]+'\n';});
  }
  body+='\nFélicitations pour ton engagement !\n\nCordialement';
  window.location.href='mailto:'+(ctrl.email||'')+'?subject='+subj+'&body='+encodeURIComponent(body);
  showToast('✉️ Ouverture de la messagerie...');
}

var formProfil='jeune';

function renderAddCtrl(app,ctrlId) {
  var ctrl=ctrlId?getCtrl(ctrlId):null;
  var isEdit=!!ctrl;

  if(ctrl)ps[ctrl.profil]='__sel__'; else ps.jeune='__sel__';

  app.innerHTML=
    '<div class="hdr">'+
      '<button class="btn-back" onclick="goBack()">←</button>'+
      '<div style="flex:1"><h1>'+(isEdit?'Modifier le profil':'Nouveau contrôleur')+'</h1></div>'+
      (isEdit?'<button class="btn-ico" style="background:#FEF2F2;color:#DC2626" onclick="onDeleteCtrl(\''+ctrlId+'\')">🗑️</button>':'')+
    '</div>'+
    '<div class="scr">'+
      '<div class="stitle">Identité</div>'+
      '<div class="fg"><label class="flbl">Prénom</label><input class="finp" id="f-pn" placeholder="Prénom" value="'+(ctrl?escHtml(ctrl.prenom):'')+'"></div>'+
      '<div class="fg"><label class="flbl">Nom</label><input class="finp" id="f-nm" placeholder="Nom" value="'+(ctrl?escHtml(ctrl.nom):'')+'"></div>'+
      '<div class="fg"><label class="flbl">Email</label><input class="finp" id="f-em" type="email" placeholder="email@exemple.com" value="'+(ctrl&&ctrl.email?escHtml(ctrl.email):'')+'"></div>'+
      '<div class="fg"><label class="flbl">Centre</label><input class="finp" id="f-ct" placeholder="Ex : CTCEM, ACT..." value="'+(ctrl&&ctrl.centre?escHtml(ctrl.centre):'')+'"></div>'+
      '<hr class="dv">'+
      '<div class="stitle">Profil & prime maximum</div>'+
      '<div class="pg">'+
        '<button class="pb '+(ps.jeune?'sj':'')+'" id="pb-j" onclick="onFormProfil(\'jeune\')"><div class="pr">Jeune contrôleur</div><div class="pm">300 €</div></button>'+
        '<button class="pb '+(ps.confirme?'sc':'')+'" id="pb-c" onclick="onFormProfil(\'confirme\')"><div class="pr">Confirmé</div><div class="pm">500 €</div></button>'+
        '<button class="pb '+(ps.responsable?'sr':'')+'" id="pb-r" onclick="onFormProfil(\'responsable\')"><div class="pr">Responsable</div><div class="pm">600 €</div></button>'+
      '</div>'+
      '<button class="btn btn-p" onclick="onSaveCtrl(\''+( ctrlId||'')+'\')">'+
        (isEdit?'✅ Sauvegarder les modifications':'➕ Ajouter le contrôleur')+
      '</button>'+
      (isEdit?'<button class="btn" style="background:#FEF2F2;color:#DC2626;border:1px solid #FECACA;margin-top:8px" onclick="onDeleteCtrl(\''+ctrlId+'\')">🗑️ Supprimer ce contrôleur</button>':'')+
    '</div>';
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function onFormProfil(p) {
  formProfil=p;
  var cls={jeune:'sj',confirme:'sc',responsable:'sr'};
  ['jeune','confirme','responsable'].forEach(function(k){
    var btn=document.getElementById('pb-'+k[0]);
    if(btn) btn.className='pb'+(k===p?' '+cls[k]:'');
  });
}

function onSaveCtrl(ctrlId) {
  var pn=(document.getElementById('f-pn').value||'').trim();
  var nm=(document.getElementById('f-nm').value||'').trim();
  var em=(document.getElementById('f-em').value||'').trim();
  var ct=(document.getElementById('f-ct').value||'').trim();
  if(!pn||!nm){showToast('⚠️ Prénom et nom requis');return;}
  if(ctrlId){
    var ctrl=getCtrl(ctrlId);
    ctrl.prenom=pn;ctrl.nom=nm;ctrl.email=em;ctrl.centre=ct;ctrl.profil=formProfil;
    saveDB();showToast('✅ Profil mis à jour');goBack();
  } else {
    db.controleurs.push({id:uid(),prenom:pn,nom:nm,email:em,centre:ct,profil:formProfil,evaluations:[]});
    saveDB();showToast('✅ '+pn+' '+nm+' ajouté !');goBack();
  }
}

function onDeleteCtrl(ctrlId) {
  if(!confirm('Supprimer ce contrôleur et toutes ses évaluations ?'))return;
  db.controleurs=db.controleurs.filter(function(c){return c.id!==ctrlId;});
  saveDB();
  navStack=[{page:'home'}];
  render();showToast('🗑️ Contrôleur supprimé');
}

var recapYear=curY();

function renderRecap(app) {
  var list=db.controleurs.slice().sort(function(a,b){return(a.nom||'').localeCompare(b.nom||'');});
  var grandTotal=0;

  var ctrlCards=list.length===0?
    '<div class="empty"><div class="empty-ico">📊</div><div class="empty-ttl">Aucune donnée</div><div class="empty-sub">Ajoute des contrôleurs et des évaluations pour voir le récapitulatif.</div></div>'
    :
    list.map(function(ctrl){
      var evs=[1,2,3,4].map(function(t){return getEval(ctrl,recapYear,t);});
      var total=evs.reduce(function(s,e){return s+(e?e.fin:0);},0);
      grandTotal+=total;
      var ac=avColor(ctrl.nom);
      var bdgCls={jeune:'bdg-j',confirme:'bdg-c',responsable:'bdg-r'}[ctrl.profil]||'bdg-j';
      return '<div class="card">'+
        '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+
          '<div class="av" style="background:'+ac[0]+';color:'+ac[1]+';width:38px;height:38px;font-size:12px">'+initials(ctrl.prenom,ctrl.nom)+'</div>'+
          '<div style="flex:1;min-width:0">'+
            '<div style="font-size:14px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+ctrl.prenom+' '+ctrl.nom+'</div>'+
            '<span class="bdg '+bdgCls+'">'+profilLabel(ctrl.profil)+'</span>'+
          '</div>'+
          '<div style="text-align:right">'+
            '<div style="font-size:18px;font-weight:900;color:var(--blue)">'+total+' €</div>'+
            '<div style="font-size:11px;color:var(--g400)">Total '+recapYear+'</div>'+
          '</div>'+
        '</div>'+
        '<table class="rtbl">'+
          '<thead><tr>'+
            '<th>Trimestre</th><th>Score</th><th>Bonus 🏆</th><th style="text-align:right">Prime</th>'+
          '</tr></thead>'+
          '<tbody>'+
            [1,2,3,4].map(function(t,i){
              var ev=evs[i];
              return '<tr>'+
                '<td><span class="bdg bdg-t">T'+t+'</span></td>'+
                '<td>'+(ev?ev.sg+'%':'<span style="color:var(--g200)">—</span>')+'</td>'+
                '<td>'+(ev&&ev.btot>0?'<span style="color:#D97706;font-weight:700">+'+ev.btot+' €</span>':'<span style="color:var(--g200)">—</span>')+'</td>'+
                '<td style="text-align:right;font-weight:800">'+(ev?ev.fin+' €':'<span style="color:var(--g200)">—</span>')+'</td>'+
              '</tr>';
            }).join('')+
          '</tbody>'+
          '<tfoot><tr class="recap-total">'+
            '<td colspan="3"><strong>Total '+recapYear+'</strong></td>'+
            '<td style="text-align:right"><strong>'+total+' €</strong></td>'+
          '</tr></tfoot>'+
        '</table>'+
        '<button class="btn btn-o" style="margin-top:10px;margin-bottom:0;padding:10px;font-size:13px" onclick="navigate(\'eval\',{ctrlId:\''+ctrl.id+'\'})">📝 Évaluer ce trimestre</button>'+
      '</div>';
    }).join('');

  app.innerHTML=
    '<div class="hdr">'+
      '<div style="flex:1"><h1>Récapitulatif annuel</h1><div class="sub">Primes versées par contrôleur</div></div>'+
    '</div>'+
    '<div class="scr">'+
      '<div class="ynav">'+
        '<button onclick="onRecapYear(-1)">◀</button>'+
        '<span>'+recapYear+'</span>'+
        '<button onclick="onRecapYear(1)">▶</button>'+
      '</div>'+
      ctrlCards+
      (list.length>0?
        '<div class="card" style="background:var(--g900);border-color:var(--g700);margin-top:4px">'+
          '<div style="display:flex;justify-content:space-between;align-items:center">'+
            '<div style="color:var(--g400);font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.06em">Total équipe '+recapYear+'</div>'+
            '<div style="font-size:22px;font-weight:900;color:white">'+grandTotal+' €</div>'+
          '</div>'+
        '</div>'
      :'')+
    '</div>'+
    bnav('recap');
}

function onRecapYear(d){recapYear+=d;renderRecap(document.getElementById('app'));}

function onExport() {
  var blob=new Blob([JSON.stringify(db,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;a.download='primes-excellence-'+new Date().toISOString().split('T')[0]+'.json';
  a.click();URL.revokeObjectURL(url);
  showToast('📤 Export réussi !');
}

function onImport(input) {
  var file=input.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var d=JSON.parse(e.target.result);
      if(!d.controleurs)throw new Error('Format invalide');
      db=d;saveDB();showToast('✅ Import réussi !');
      navStack=[{page:'home'}];render();
    }catch(err){showToast('❌ Fichier invalide');}
  };
  reader.readAsText(file);
}

function onClearAll() {
  if(!confirm('Effacer TOUTES les données ? Cette action est irréversible.'))return;
  db={controleurs:[]};saveDB();
  navStack=[{page:'home'}];render();showToast('🗑️ Données effacées');
}
